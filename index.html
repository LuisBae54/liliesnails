<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Gestor de Servicios - LiliesNails</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Nunito:wght@700;800&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="encabezado-principal">
      <div class="contenedor-logo-titulo">
        <img
          src="liliesnails.png"
          alt="Logo Lilies Nails"
          class="logo-tienda"
        />
        <h1>Gestor de Servicios</h1>
      </div>
    </header>
    <section id="seccion-servicios">
      <h2>Crear y Ver Servicios</h2>

      <div class="crear-servicio">
        <h3>Nuevo Servicio</h3>
        <input
          type="text"
          id="nombreServicio"
          placeholder="Nombre (ej: Acrílicas Full)"
        />
        <input
          type="number"
          id="gananciaHora"
          value=""
          placeholder="Ganancia/Hora $"
        />
        <input
          type="number"
          id="tiempoTrabajo"
          value=""
          step="0.5"
          placeholder="Horas"
        />
        <input
          type="number"
          id="margenDeseado"
          value=""
          placeholder="% Ganancia"
        />

        <h4>Materiales a usar:</h4>
        <div id="contenedor-checkboxes"></div>

        <button id="btn-guardar-servicio" , class="btn-guardar-servicio">
          Calcular y Guardar Servicio
        </button>
      </div>

      <h3>Lista de Servicios (Menú)</h3>
      <div class="sort-container">
        <span>Ordenar por:</span>
        <button onclick="ordenarServicios('nombre')" title="Alfabético">
          <i class="fa-solid fa-arrow-down-a-z"></i>
        </button>
        <button onclick="ordenarServicios('precio')" title="Por Precio">
          <i class="fa-solid fa-hand-holding-dollar"></i>
        </button>
        <button onclick="ordenarServicios('fecha')" title="Más recientes">
          <i class="fa-solid fa-calendar-days"></i>
        </button>
      </div>
      <div class="contenedor-tabla">
        <table id="tabla-servicios">
          <thead>
            <tr>
              <th>Servicio</th>
              <th>Porcentaje</th>
              <th>Precio Final</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="cuerpo-servicios"></tbody>
        </table>
      </div>
      <button id="btn-exportar" class="button">Descargar Menú (.txt)</button>
    </section>

    <section id="seccion-inventario">
      <h2>Inventario de Materiales</h2>
      <div class="sort-container">
        <span>Ordenar por:</span>
        <button onclick="ordenarMateriales('nombre')" title="Alfabético">
          <i class="fa-solid fa-arrow-down-a-z"></i>
        </button>
        <button onclick="ordenarMateriales('precio')" title="Por Precio">
          <i class="fa-solid fa-hand-holding-dollar"></i>
        </button>
        <button onclick="ordenarMateriales('fecha')" title="Más recientes">
          <i class="fa-solid fa-calendar-days"></i>
        </button>
      </div>

      <div class="registro">
        <input
          type="text"
          id="nombreMat"
          placeholder="Material (ej: Top Coat)"
        />
        <input type="number" id="precioMat" placeholder="Precio pagado ($)" />
        <input type="number" id="usoMat" placeholder="¿Cuántas veces rinde?" />
        <button id="btn-agregar" , class="button">Agregar al Inventario</button>
      </div>
      <div class="contenedor-tabla">
        <table id="tabla-inventario">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Precio</th>
              <th>Rinde</th>
              <th>Costo/Uso</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="cuerpo-tabla"></tbody>
        </table>
      </div>
    </section>
    <section>
      <div class="seccion-respaldo">
        <h3>Respaldo de Seguridad</h3>
        <button onclick="exportarDatos()" class="btn-respaldo">
          Descargar Respaldo
        </button>
        <label for="importarArchivo" class="btn-importar">Subir Respaldo</label>
        <input
          type="file"
          id="importarArchivo"
          style="display: none"
          onchange="importarDatos(event)"
        />
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
